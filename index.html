<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Parking Dashboard</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuSXP4AeKXNnO1Uyj3Ds5soheQXzedsmk",
      authDomain: "smart-parking-60139.firebaseapp.com",
      databaseURL: "https://smart-parking-60139-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "smart-parking-60139",
      storageBucket: "smart-parking-60139.appspot.com",
      messagingSenderId: "284320423783",
      appId: "1:284320423783:web:535b714ab14f70597899c2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    let currentUserEmail = "";
    let slotsData = {};
    let timerStarted = false;

    function getCardColour(status) {
      if (status === "empty") return "#2ecc71";
      if (status === "filled") return "#e74c3c";
      if (status === "booked") return "#f1c40f";
      return "#bdc3c7";
    }

    function getRemainingSeconds(time) {
      const remaining = 30 - Math.floor((Date.now() - time) / 1000);
      return remaining > 0 ? remaining : 0;
    }

    function formatTime(value) {
      if (!value || value === 0) return "-";
      return new Date(value).toLocaleString();
    }

    function getCardText(slotKey, status, time) {
      const slotName = slotKey.toUpperCase();

      if (status === "empty") return `${slotName} - EMPTY`;
      if (status === "filled") return `${slotName} - FILLED`;
      if (status === "booked") {
        const remaining = getRemainingSeconds(time);
        return `${slotName} - BOOKED (${remaining}s)`;
      }

      return `${slotName} - UNKNOWN`;
    }

    async function bookSlot(slotKey) {
      await update(ref(database, "slots/" + slotKey), {
        status: "booked",
        user: currentUserEmail,
        time: Date.now()
      });
    }

    async function cancelBooking(slotKey) {
      await update(ref(database, "slots/" + slotKey), {
        status: "empty",
        user: "",
        time: 0
      });
    }

    async function expireBookings() {
      for (const key in slotsData) {
        const slot = slotsData[key];
        if (slot.status === "booked") {
          const remaining = getRemainingSeconds(slot.time || 0);
          if (remaining <= 0) {
            await update(ref(database, "slots/" + key), {
              status: "empty",
              user: "",
              time: 0
            });
          }
        }
      }
    }

    function renderTable() {
      const tableBody = document.getElementById("tableBody");
      tableBody.innerHTML = "";

      for (const key in slotsData) {
        const slot = slotsData[key];

        const row = `
          <tr>
            <td>${key.toUpperCase()}</td>
            <td>${slot.status}</td>
            <td>${formatTime(slot.last_checkin)}</td>
            <td>${formatTime(slot.last_checkout)}</td>
          </tr>
        `;

        tableBody.innerHTML += row;
      }
    }

    function renderSlots() {
      let availableCount = 0;

      for (const key in slotsData) {
        const slot = slotsData[key];
        const card = document.getElementById(key);
        if (!card) continue;

        if (slot.status === "empty") availableCount++;

        card.style.background = getCardColour(slot.status);
        card.innerText = getCardText(key, slot.status, slot.time || 0);

        card.onclick = async () => {
          const currentSlot = slotsData[key];

          if (currentSlot.status === "empty") {
            await bookSlot(key);
            alert(key.toUpperCase() + " booked successfully");
          } else if (currentSlot.status === "filled") {
            alert(key.toUpperCase() + " is already filled");
          } else if (currentSlot.status === "booked") {
            if (currentSlot.user === currentUserEmail) {
              await cancelBooking(key);
              alert("Booking removed for " + key.toUpperCase());
            } else {
              alert(key.toUpperCase() + " is already booked by another user");
            }
          }
        };
      }

      document.getElementById("available").innerText = "Available: " + availableCount;
      document.getElementById("updated").innerText = "Last Update: " + new Date().toLocaleTimeString();

      renderTable();
    }

    window.addEventListener("load", () => {
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "login.html";
          return;
        }

        currentUserEmail = user.email;
        document.getElementById("userEmail").innerText = currentUserEmail;

        const slotsRef = ref(database, "slots");

        onValue(slotsRef, (snapshot) => {
          const data = snapshot.val();
          if (!data) return;
          slotsData = data;
          renderSlots();
        });

        if (!timerStarted) {
          timerStarted = true;
          setInterval(async () => {
            await expireBookings();
            renderSlots();
          }, 1000);
        }
      });

      window.logout = async () => {
        await signOut(auth);
        window.location.href = "login.html";
      };
    });
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif;
    }

    :root {
      --bg: linear-gradient(135deg, #eef2f7, #d9e2ec);
      --card-bg: #ffffff;
      --text: #1f2937;
      --table-head: #1f2937;
    }

    body.dark {
      --bg: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      --card-bg: rgba(255,255,255,0.1);
      --text: #ffffff;
      --table-head: #0b1320;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      padding: 30px;
      transition: 0.3s ease;
    }

    .top-bar {
      position: absolute;
      top: 20px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-badge {
      background: var(--card-bg);
      padding: 8px 15px;
      border-radius: 25px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .toggle-btn, .logout-btn {
      padding: 8px 15px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      color: white;
      transition: 0.3s;
    }

    .toggle-btn { background: #2563eb; }
    .logout-btn { background: #e74c3c; }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 50px;
      font-weight: 600;
    }

    .stats {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 25px;
      margin-bottom: 45px;
    }

    .stats h2 {
      background: var(--card-bg);
      padding: 20px 40px;
      border-radius: 18px;
      font-size: 1.1rem;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .parking-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      margin-bottom: 40px;
    }

    .card {
      width: 220px;
      height: 120px;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      color: #111;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      padding: 10px;
    }

    .table-wrap {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid rgba(128,128,128,0.25);
    }

    th {
      background: var(--table-head);
      color: white;
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <div class="user-badge">👤 <span id="userEmail">Loading...</span></div>
    <button class="toggle-btn" onclick="toggleMode()" id="modeBtn">🌙 Dark Mode</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <h1>🚗 Smart Parking Dashboard</h1>

  <div class="stats">
    <h2>Total Slots: 4</h2>
    <h2 id="available">Available: 0</h2>
    <h2 id="updated">Last Update: --</h2>
  </div>

  <div class="parking-container">
    <div id="slot1" class="card">SLOT1</div>
    <div id="slot2" class="card">SLOT2</div>
    <div id="slot3" class="card">SLOT3</div>
    <div id="slot4" class="card">SLOT4</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Slot</th>
          <th>Status</th>
          <th>Last Check-In</th>
          <th>Last Check-Out</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    function toggleMode() {
      const body = document.body;
      const btn = document.getElementById("modeBtn");
      body.classList.toggle("dark");
      btn.innerText = body.classList.contains("dark") ? "☀ Light Mode" : "🌙 Dark Mode";
    }
  </script>
</body>
</html>
