<!DOCTYPE html>
<html>
<head>
<title>Smart Parking System</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1f4037,#99f2c8);
margin:0;
padding:20px;
color:white;
}

h1{
text-align:center;
margin-bottom:30px;
}

.stats{
display:flex;
justify-content:space-around;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
width:22%;
text-align:center;
backdrop-filter:blur(10px);
transition:0.3s;
cursor:pointer;
}

.card.full{
background:rgba(255,0,0,0.7);
}

.card.empty{
background:rgba(0,128,0,0.7);
}

.card.booked{
background:rgba(255,204,0,0.9);
color:black;
}

.history{
margin-top:40px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.3);
text-align:center;
}

</style>
</head>

<body>

<h1>🚗 Smart Parking Dashboard</h1>

<div class="stats">
<h2>Total Slots: 4</h2>
<h2 id="available">Available: 0</h2>
<h2 id="updated">Last Update: --</h2>
</div>

<div class="stats">

<div id="slot1" class="card" onclick="toggleSlot(1)">Slot 1</div>
<div id="slot2" class="card" onclick="toggleSlot(2)">Slot 2</div>
<div id="slot3" class="card" onclick="toggleSlot(3)">Slot 3</div>
<div id="slot4" class="card" onclick="toggleSlot(4)">Slot 4</div>

</div>

<div class="history">
<h2>Parking History</h2>

<table>
<thead>
<tr>
<th>Slot</th>
<th>Entry Time</th>
<th>Exit Time</th>
<th>Duration</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>
</div>

<script>

const firebaseConfig = {

apiKey:"AIzaSyAuSXP4AeKXNnO1Uyj3Ds5soheQXzedsmk",
authDomain:"smart-parking-60139.firebaseapp.com",
databaseURL:"https://smart-parking-60139-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"smart-parking-60139",

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();


/* READ SLOT DATA */

db.ref("slots").on("value",(snapshot)=>{

const data = snapshot.val();
if(!data) return;

let availableCount = 0;

for(let i=1;i<=4;i++){

let status = data["slot"+i];

let element = document.getElementById("slot"+i);

element.innerHTML = `
<h3>Slot ${i}</h3>
<p>Status: ${status}</p>
`;

if(status === "empty"){

element.className="card empty";
availableCount++;

}
else if(status === "full"){

element.className="card full";

}
else if(status === "booked"){

element.className="card booked";

}

}

document.getElementById("available").innerText="Available: "+availableCount;

document.getElementById("updated").innerText="Last Update: "+new Date().toLocaleTimeString();

});


/* SLOT CLICK FUNCTION */

function toggleSlot(slotNumber){

let ref = db.ref("slots/slot"+slotNumber);

ref.once("value").then((snapshot)=>{

let status = snapshot.val();

if(status==="empty"){

ref.set("booked");

}
else if(status==="booked"){

ref.set("empty");

}

});

}

</script>

</body>
</html>
