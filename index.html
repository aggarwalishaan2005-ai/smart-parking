<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parking Dashboard</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAuSXP4AeKXNnO1Uyj3Ds5soheQXzedsmk",
authDomain: "smart-parking-60139.firebaseapp.com",
databaseURL: "https://smart-parking-60139-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "smart-parking-60139",
storageBucket: "smart-parking-60139.appspot.com",
messagingSenderId: "284320423783",
appId: "1:284320423783:web:535b714ab14f70597899c2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

window.addEventListener("load",()=>{

onAuthStateChanged(auth,(user)=>{

if(!user || user.email!=="admin@parking.com")
{
window.location.href="login.html";
}
else
{
document.getElementById("userEmail").innerText=user.email;
}

});

window.logout=async()=>{
await signOut(auth);
window.location.href="login.html";
};

const slotsRef = ref(database,"slots");

onValue(slotsRef,(snapshot)=>{

const data = snapshot.val();

let available=0;

for(let key in data)
{

const card=document.getElementById(key);
const status=data[key];

if(status==="empty")
{
card.style.background="#2ecc71";
card.innerText=key.toUpperCase()+" - EMPTY";
available++;
}

else if(status==="filled")
{
card.style.background="#e74c3c";
card.innerText=key.toUpperCase()+" - FILLED";
}

else if(status==="booked")
{
card.style.background="#f1c40f";
card.innerText=key.toUpperCase()+" - BOOKED";
}

card.onclick=async()=>{

if(status==="empty")
{
await set(ref(database,"slots/"+key),"booked");
}

else if(status==="filled")
{
alert("Slot already filled");
}

else if(status==="booked")
{
alert("Slot already booked");
}

};

}

document.getElementById("available").innerText="Available: "+available;
document.getElementById("updated").innerText="Last Update: "+new Date().toLocaleTimeString();

});

});

</script>

<style>

body{
font-family:Poppins;
text-align:center;
background:#eef2f7;
padding:30px;
}

h1{
margin-bottom:40px;
}

.stats{
display:flex;
justify-content:center;
gap:30px;
margin-bottom:40px;
}

.parking-container{
display:flex;
justify-content:center;
gap:25px;
}

.card{
width:200px;
height:120px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h1>🚗 Smart Parking Dashboard</h1>

<div class="stats">

<h2>Total Slots: 4</h2>
<h2 id="available">Available: 0</h2>
<h2 id="updated">Last Update</h2>

</div>

<div class="parking-container">

<div id="slot1" class="card">Slot1</div>
<div id="slot2" class="card">Slot2</div>
<div id="slot3" class="card">Slot3</div>
<div id="slot4" class="card">Slot4</div>

</div>

</body>
</html>
