<!DOCTYPE html>
<html>
<head>
<title>Smart Parking Dashboard</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f5f5f5;
}

h1{
    margin-top:20px;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:50px;
}

.slot{
    width:120px;
    height:120px;
    line-height:120px;
    font-size:20px;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.empty{
    background:green;
}

.filled{
    background:red;
}

.booked{
    background:gold;
    color:black;
}
</style>

</head>

<body>

<h1>Smart Parking Dashboard</h1>

<div class="container">

<div id="slot1" class="slot empty" onclick="toggleSlot('slot1')">
Slot 1<br>
<span id="status1">Empty</span>
</div>

<div id="slot2" class="slot empty" onclick="toggleSlot('slot2')">
Slot 2<br>
<span id="status2">Empty</span>
</div>

<div id="slot3" class="slot empty" onclick="toggleSlot('slot3')">
Slot 3<br>
<span id="status3">Empty</span>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


function updateSlotUI(slot,status){

let slotDiv=document.getElementById(slot);
let statusText=document.getElementById("status"+slot.replace("slot",""));

slotDiv.classList.remove("empty","filled","booked");

if(status==="empty"){
slotDiv.classList.add("empty");
statusText.innerText="Empty";
}

if(status==="filled"){
slotDiv.classList.add("filled");
statusText.innerText="Filled";
}

if(status==="booked"){
slotDiv.classList.add("booked");
statusText.innerText="Booked";
}

}


function toggleSlot(slot){

const slotRef=ref(db,"slots/"+slot);

onValue(slotRef,(snapshot)=>{

let current=snapshot.val();

if(current==="empty"){
set(slotRef,"booked");
}

else if(current==="booked"){
set(slotRef,"empty");
}

},{onlyOnce:true});

}


const slotsRef=ref(db,"slots");

onValue(slotsRef,(snapshot)=>{

let data=snapshot.val();

if(data){

updateSlotUI("slot1",data.slot1);
updateSlotUI("slot2",data.slot2);
updateSlotUI("slot3",data.slot3);

}

});

window.toggleSlot=toggleSlot;

</script>

</body>
</html>
